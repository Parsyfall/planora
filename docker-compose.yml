services:
  backend:
    build: .
    container_name: planora-backend
    ports:
      - "3000:3000"
    depends_on:
      - mysql
    env_file:
      - .env
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: planora-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: planora
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: