services:
  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: planora_db
      MYSQL_USER: planora_user
      MYSQL_PASSWORD: planora_pass
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./docker/mysql/init:/docker-entrypoint-initdb.d:ro,Z
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3001
      NODE_ENV: development
      APP_ORIGIN: http://localhost:8088
      JWT_SECRET: change_this_secret_in_production
      JWT_EXPIRES_IN: 7d
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: planora_user
      DB_PASSWORD: planora_pass
      DB_NAME: planora_db
      DB_CONNECTION_LIMIT: 10
      SMTP_HOST: ""
      SMTP_PORT: 587
      SMTP_SECURE: false
      SMTP_USER: ""
      SMTP_PASS: ""
      SMTP_FROM: Planora <no-reply@planora.local>
    ports:
      - "3001:3001"
    volumes:
      - ./backend:/app:Z
      - /app/node_modules
    command: npm run dev 
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/api/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 25s

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8088:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:Z
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:latest
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"

volumes:
  mysql_data:
